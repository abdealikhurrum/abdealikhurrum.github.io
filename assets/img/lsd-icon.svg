<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <!-- Background: deep ink-blue → warm dark teal -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#111827"/>
      <stop offset="100%" stop-color="#0E4D5C"/>
    </linearGradient>

    <!-- Warm radial bloom behind the ligature -->
    <radialGradient id="bloom" cx="50%" cy="48%" r="42%">
      <stop offset="0%"   stop-color="#C8914A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C8914A" stop-opacity="0"/>
    </radialGradient>

    <!-- Ligature text shadow / glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clipping mask: iOS rounded-square -->
    <clipPath id="shape">
      <rect width="512" height="512" rx="114"/>
    </clipPath>

  </defs>

  <g clip-path="url(#shape)">

    <!-- Base background -->
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Warm bloom centred on the ligature -->
    <rect width="512" height="512" fill="url(#bloom)"/>

    <!-- ─────────────────────────────────────────
         Thin gold rule — like a ruled writing line,
         or a keyboard base-line
         ───────────────────────────────────────── -->
    <line x1="64" y1="356" x2="448" y2="356"
          stroke="#C8914A" stroke-width="1.5" stroke-opacity="0.45"/>

    <!-- ─────────────────────────────────────────
         چھے  ligature
         Rendered at large size so the connected
         form, the loop, and the three dots read
         clearly even at small icon sizes.

         Font stack: FatemiMaqala (app font) →
         Noto Naskh Arabic (web fallback) →
         system Arabic serif.
         ───────────────────────────────────────── -->

    <!-- Soft shadow pass (slightly offset, blurred, amber) -->
    <text
      x="260" y="344"
      font-family="FatemiMaqala, 'FatemiMaqala-Regular', 'Noto Naskh Arabic', 'Traditional Arabic', 'Arabic Typesetting', serif"
      font-size="236"
      text-anchor="middle"
      fill="#C8914A"
      fill-opacity="0.35"
      filter="url(#glow)"
      direction="rtl">چھے</text>

    <!-- Main ligature — warm parchment white -->
    <text
      x="256" y="340"
      font-family="FatemiMaqala, 'FatemiMaqala-Regular', 'Noto Naskh Arabic', 'Traditional Arabic', 'Arabic Typesetting', serif"
      font-size="236"
      text-anchor="middle"
      fill="#F2EAD8"
      direction="rtl">چھے</text>

  </g>

</svg>
